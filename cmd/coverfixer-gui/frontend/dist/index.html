<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverfixer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="titlebar"><span class="titlebar-title">Music Preflight</span></header>
<main class="app">
    <section class="folder-row">
        <svg class="folder-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12.4142 5H21C21.5523 5 22 5.44772 22 6V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3H10.4142L12.4142 5Z"></path></svg>
        <button id="folderBtn" class="btn" type="button">Choose Folder</button>
        <span id="pathLabel" class="path">No folder selected</span>
    </section>
    <input type="hidden" id="dir" />
    <div class="content">
    <div class="sidebar">
    <div class="groups">
    <option-group id="resizeEmbeddedGroup" label="Resize Cover Art">
        <label class="field">
            <span>Size</span>
            <tab-bar id="embeddedArtSize" value="500" options="500,480,320,240"></tab-bar>
        </label>
    </option-group>

    <option-group id="coverJpgGroup" label="Extract cover.jpg" checked>
        <label class="field">
            <span>Size</span>
            <tab-bar id="coverJpgSize" value="500" options="500,480,320,240"></tab-bar>
        </label>
    </option-group>

    <option-group id="transcodeGroup" label="Transcode">
        <div class="fields">
            <label class="field">
                <span>Format</span>
                <tab-bar id="transcodeFormat" value="mp3" options="MP3:mp3,AAC:aac"></tab-bar>
            </label>
            <label class="field">
                <span>Quality</span>
                <tab-bar id="transcodeQuality" value="320" options="320,256,192"></tab-bar>
            </label>
        </div>
    </option-group>

    <option-group id="metadataGroup" label="Metadata">
        <div class="meta-fields">
            <label class="field">
                <span>Album Artist</span>
                <input type="text" id="albumArtist" placeholder="prefilled on folder pick" autocomplete="off" />
            </label>
            <label class="field">
                <span>Genre</span>
                <input type="text" id="genre" placeholder="prefilled on folder pick" autocomplete="off" />
            </label>
        </div>
    </option-group>
    </div>

    <section class="actions">
        <div id="progressBar" class="progress-bar" hidden aria-hidden="true"><div class="progress-bar-fill"></div></div>
        <toggle-switch id="backup" label="Create backup"></toggle-switch>
        <button id="debugRunBtn" class="btn" type="button">Debug Run</button>
        <button id="runBtn" class="btn btn-primary" type="button" disabled>Run</button>
        <button id="cancelBtn" class="btn btn-cancel" type="button" hidden>Cancel</button>
    </section>

    <section class="summary">
        <pre id="summary" class="summary-text"></pre>
        <pre id="error" class="error-text" role="alert"></pre>
    </section>
    </div>

    <section id="libraryBlock" class="progress" aria-label="Library" hidden>
        <div id="preview" class="preview"></div>
    </section>
    </div>
</main>
<script src="toggle-switch.js"></script>
<script src="option-group.js"></script>
<script src="tab-bar.js"></script>
<script src="preview.js"></script>
<script src="app.js"></script>
</body>
</html>
