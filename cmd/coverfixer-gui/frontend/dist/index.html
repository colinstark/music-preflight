<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coverfixer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="app">
    <section class="folder-row">
        <button id="folderBtn" class="btn" type="button">Choose Folder</button>
        <span id="pathLabel" class="path" title="">No folder selected</span>
    </section>
    <input type="hidden" id="dir" />

    <section class="panel options" aria-label="Options">
        <div class="checks">
            <label><input type="checkbox" id="dryRun" /> Dry-run</label>
            <label><input type="checkbox" id="recursive" /> Recursive</label>
            <label><input type="checkbox" id="renameStrayJpg" /> Rename stray jpg</label>
            <label><input type="checkbox" id="resizeCoverJpg" /> Resize cover.jpg</label>
            <label><input type="checkbox" id="extractCover" /> Extract cover</label>
            <label><input type="checkbox" id="resizeEmbedded" /> Resize embedded</label>
            <label><input type="checkbox" id="backup" /> Backup</label>
        </div>
        <div class="fields">
            <label class="field">
                <span>Art size</span>
                <input type="number" id="artSize" min="1" step="1" />
            </label>
            <label class="field">
                <span>JPEG quality</span>
                <input type="number" id="jpegQuality" min="1" max="100" step="1" />
            </label>
            <label class="field">
                <span>Transcode</span>
                <select id="transcode">
                    <option value="none">none</option>
                    <option value="mp3-320">mp3-320</option>
                    <option value="aac-256">aac-256</option>
                </select>
            </label>
        </div>
        <div class="genre-row">
            <label class="check-inline"><input type="checkbox" id="setGenre" /> Set genre</label>
            <input type="text" id="genre" placeholder="prefilled on folder pick" autocomplete="off" />
        </div>
    </section>

    <section class="actions">
        <button id="cancelBtn" class="btn" type="button" disabled>Cancel</button>
        <button id="runBtn" class="btn btn-primary" type="button" disabled>Run</button>
    </section>

    <section class="progress" aria-label="Progress">
        <label for="log" class="panel-header">Progress</label>
        <pre id="log" class="log" aria-live="polite"></pre>
    </section>

    <section class="summary">
        <pre id="summary" class="summary-text"></pre>
        <pre id="error" class="error-text" role="alert"></pre>
    </section>
</main>
<script src="app.js"></script>
</body>
</html>
